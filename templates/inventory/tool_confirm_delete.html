{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <h2><i class="bi bi-trash"></i> {{ title }}</h2>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body">
                    <h5>Konfirmasi Hapus Tool</h5>
                    <p>Apakah Anda yakin ingin menonaktifkan tool berikut?</p>
                    <div class="alert alert-warning">
                        <strong>{{ tool.name }}</strong><br>
                        Stock: {{ tool.stock }}
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Ya, Nonaktifkan</button>
                            <a href="{% url 'inventory:tool_list' %}" class="btn btn-secondary">Batal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
